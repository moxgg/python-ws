<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯CSS精美时钟</title>
    <style>
        /* 全局样式重置和基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Arial', sans-serif;
        }

        /* 时钟容器 */
        .clock {
            width: 400px;
            height: 400px;
            background-color: #f8f9fa;
            border-radius: 50%;
            border: 15px solid #ffffff;
            box-shadow: 
                0 0 0 4px rgba(0, 0, 0, 0.1),
                inset 0 0 0 3px #efefef,
                inset 0 0 10px rgba(0, 0, 0, 0.2),
                0 20px 20px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        /* 时钟中心圆点 */
        .clock::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #2c3e50;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 刻度样式 */
        .clock .mark {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            transform: rotate(var(--rotation));
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
        }

        /* 数字定位 */
        .mark-1 { --rotation: 30deg; }
        .mark-2 { --rotation: 60deg; }
        .mark-3 { --rotation: 90deg; }
        .mark-4 { --rotation: 120deg; }
        .mark-5 { --rotation: 150deg; }
        .mark-6 { --rotation: 180deg; }
        .mark-7 { --rotation: 210deg; }
        .mark-8 { --rotation: 240deg; }
        .mark-9 { --rotation: 270deg; }
        .mark-10 { --rotation: 300deg; }
        .mark-11 { --rotation: 330deg; }
        .mark-12 { --rotation: 0deg; }

        /* 指针通用样式 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px 10px 0 0;
            transform: translateX(-50%) rotate(0deg);
        }

        /* 时针样式 */
        .hour-hand {
            width: 10px;
            height: 100px;
            background-color: #2c3e50;
            z-index: 3;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            animation: rotateHour 43200s linear infinite; /* 12小时旋转一周 */
        }

        /* 分针样式 */
        .minute-hand {
            width: 6px;
            height: 140px;
            background-color: #34495e;
            z-index: 4;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            animation: rotateMinute 3600s linear infinite; /* 60分钟旋转一周 */
        }

        /* 秒针样式 */
        .second-hand {
            width: 2px;
            height: 150px;
            background-color: #e74c3c;
            z-index: 5;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
            animation: rotateSecond 60s linear infinite; /* 60秒旋转一周 */
        }

        /* 动画关键帧 - 时针 */
        @keyframes rotateHour {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        /* 动画关键帧 - 分针 */
        @keyframes rotateMinute {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        /* 动画关键帧 - 秒针 */
        @keyframes rotateSecond {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        /* 响应式适配 */
        @media (max-width: 450px) {
            .clock {
                width: 300px;
                height: 300px;
                border-width: 10px;
            }
            .hour-hand { height: 75px; }
            .minute-hand { height: 105px; }
            .second-hand { height: 115px; }
            .mark { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="clock">
        <!-- 时钟刻度/数字 -->
        <div class="mark mark-1">1</div>
        <div class="mark mark-2">2</div>
        <div class="mark mark-3">3</div>
        <div class="mark mark-4">4</div>
        <div class="mark mark-5">5</div>
        <div class="mark mark-6">6</div>
        <div class="mark mark-7">7</div>
        <div class="mark mark-8">8</div>
        <div class="mark mark-9">9</div>
        <div class="mark mark-10">10</div>
        <div class="mark mark-11">11</div>
        <div class="mark mark-12">12</div>

        <!-- 时钟指针 -->
        <div class="hand hour-hand"></div>
        <div class="hand minute-hand"></div>
        <div class="hand second-hand"></div>
    </div>
</body>
</html>
